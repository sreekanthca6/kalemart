version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: kalemart
      POSTGRES_USER: kalemart
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kalemart"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./apps/backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "4000"
      PGHOST: postgres
      PGPORT: "5432"
      PGDATABASE: kalemart
      PGUSER: kalemart
      PGPASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      AI_SERVICE_URL: http://ai-service:5000
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build:
      context: ./apps/worker
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PGHOST: postgres
      PGPORT: "5432"
      PGDATABASE: kalemart
      PGUSER: kalemart
      PGPASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy

  ai-service:
    build:
      context: ./apps/ai-service
    restart: unless-stopped
    environment:
      APP_VERSION: "0.0.1"
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      PGHOST: postgres
      PGPORT: "5432"
      PGDATABASE: kalemart
      PGUSER: kalemart
      PGPASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./apps/frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
