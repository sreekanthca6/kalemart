name: Production Smoke Test

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/prod-smoke.yml
      - helm/kalemart/**
      - infra/argocd/apps/**
      - infra/k8s/cloudflared/**
      - scripts/verify-prod.sh
  workflow_dispatch:
  workflow_run:
    workflows:
      - CI — Build & Deploy
    types:
      - completed
  schedule:
    - cron: "17 13 * * *"

concurrency:
  group: prod-smoke
  cancel-in-progress: true

jobs:
  smoke:
    name: Verify production user journeys
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Wait for Argo CD rollout
        if: github.event_name == 'workflow_run' || github.event_name == 'push'
        run: sleep 300

      - name: Run production smoke test
        run: ./scripts/verify-prod.sh
