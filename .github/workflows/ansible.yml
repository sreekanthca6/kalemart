name: Ansible — k3s Cluster

on:
  push:
    branches: [main]
    paths:
      - infra/ansible/**
      - infra/terraform/ansible-inventory.tpl
  workflow_dispatch:

concurrency:
  group: ansible
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  ansible:
    name: Provision k3s cluster
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Same keyless GCP auth as the Terraform workflow
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/1034455127668/locations/global/workloadIdentityPools/github-actions/providers/github
          service_account: terraform-sa@project-305939f8-def0-4db0-b42.iam.gserviceaccount.com

      # Read node IPs directly from Terraform state in GCS
      # This is the proper Terraform → Ansible handoff: no hardcoded IPs
      - name: Get node IPs from Terraform state
        id: tf_outputs
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false

      - name: Terraform init + read outputs
        id: outputs
        working-directory: infra/terraform
        run: |
          terraform init -input=false
          SERVER_IP=$(terraform output -raw k3s_server_ip)
          AGENT_IP=$(terraform output -raw k3s_agent_ip)
          echo "server_ip=$SERVER_IP" >> $GITHUB_OUTPUT
          echo "agent_ip=$AGENT_IP"   >> $GITHUB_OUTPUT

      # Generate inventory from Terraform outputs — same template Terraform uses
      - name: Generate Ansible inventory
        run: |
          cat > infra/ansible/inventory.ini << EOF
          [k3s_server]
          ${{ steps.outputs.outputs.server_ip }} ansible_user=ansible ansible_ssh_private_key_file=~/.ssh/ansible_ed25519

          [k3s_agent]
          ${{ steps.outputs.outputs.agent_ip }} ansible_user=ansible ansible_ssh_private_key_file=~/.ssh/ansible_ed25519

          [k3s_cluster:children]
          k3s_server
          k3s_agent

          [k3s_cluster:vars]
          ansible_ssh_common_args='-o StrictHostKeyChecking=no'
          EOF
          cat infra/ansible/inventory.ini

      - name: Install Ansible
        run: pip install ansible --quiet

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ANSIBLE_SSH_PRIVATE_KEY }}" > ~/.ssh/ansible_ed25519
          chmod 600 ~/.ssh/ansible_ed25519

      # Read all secrets from Vault — single token replaces 7 individual GitHub secrets
      - name: Read secrets from Vault
        id: vault
        uses: hashicorp/vault-action@v3
        with:
          url: http://104.198.108.15:8200
          token: ${{ secrets.VAULT_TOKEN }}
          secrets: |
            kalemart/data/app GHCR_TOKEN                    | GHCR_TOKEN ;
            kalemart/data/app POSTGRES_PASSWORD             | POSTGRES_PASSWORD ;
            kalemart/data/app JWT_SECRET                    | JWT_SECRET ;
            kalemart/data/app ANTHROPIC_API_KEY             | ANTHROPIC_API_KEY ;
            kalemart/data/app SLACK_WEBHOOK_URL             | SLACK_WEBHOOK_URL ;
            kalemart/data/app CLOUDFLARE_TUNNEL_CREDENTIALS | CLOUDFLARE_TUNNEL_CREDENTIALS ;
            kalemart/data/app GRAFANA_ADMIN_PASSWORD        | GRAFANA_ADMIN_PASSWORD

      - name: Ping all nodes
        working-directory: infra/ansible
        run: ansible all -i inventory.ini -m ping

      - name: Run site.yml
        working-directory: infra/ansible
        run: ansible-playbook -i inventory.ini site.yml --diff -v
        env:
          GHCR_TOKEN:                    ${{ env.GHCR_TOKEN }}
          POSTGRES_PASSWORD:             ${{ env.POSTGRES_PASSWORD }}
          JWT_SECRET:                    ${{ env.JWT_SECRET }}
          ANTHROPIC_API_KEY:             ${{ env.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL:             ${{ env.SLACK_WEBHOOK_URL }}
          CLOUDFLARE_TUNNEL_CREDENTIALS: ${{ env.CLOUDFLARE_TUNNEL_CREDENTIALS }}
          GRAFANA_ADMIN_PASSWORD:        ${{ env.GRAFANA_ADMIN_PASSWORD }}

      - name: Upload kubeconfig
        uses: actions/upload-artifact@v4
        with:
          name: kalemart-kubeconfig
          path: ~/.kube/kalemart-k3s.yaml
          retention-days: 7
