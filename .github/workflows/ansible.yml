name: Ansible — k3s Cluster

on:
  push:
    branches: [main]
    paths:
      - infra/ansible/**
      - infra/terraform/ansible-inventory.tpl
  workflow_dispatch:   # allow manual trigger from GitHub UI

concurrency:
  group: ansible
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  ansible:
    name: Provision k3s cluster
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Install Ansible on the runner
      - name: Install Ansible
        run: |
          pip install ansible --quiet
          ansible --version

      # Write the SSH private key so Ansible can reach the VMs
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ANSIBLE_SSH_PRIVATE_KEY }}" > ~/.ssh/ansible_ed25519
          chmod 600 ~/.ssh/ansible_ed25519

      # inventory.ini is generated by Terraform and committed to the repo
      - name: Verify inventory
        run: cat infra/ansible/inventory.ini

      # Ping all nodes first — fail fast if SSH doesn't work
      - name: Ping all nodes
        working-directory: infra/ansible
        run: ansible all -i inventory.ini -m ping

      # Run the full playbook
      - name: Run site.yml
        working-directory: infra/ansible
        run: |
          ansible-playbook -i inventory.ini site.yml \
            --diff \
            -v

      # Save the kubeconfig as an artifact so you can download and use kubectl locally
      - name: Upload kubeconfig
        uses: actions/upload-artifact@v4
        with:
          name: kalemart-kubeconfig
          path: ~/.kube/kalemart-k3s.yaml
          retention-days: 7
