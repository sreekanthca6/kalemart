apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kalemart
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.io
spec:
  project: default

  source:
    repoURL: https://github.com/sreekanthca6/kalemart.git
    targetRevision: main
    path: helm/kalemart
    helm:
      valueFiles:
        - values.yaml
        - values.prod.yaml
      # Only non-secret overrides live here — safe to store in Git.
      # Secrets are managed as a Kubernetes Secret by Ansible (from Vault).
      # The Helm secret.yaml uses lookup() to read the existing secret,
      # so no secret values ever touch this file or Argo CD parameters.
      parameters:
        - name: ingress.host
          value: kalemart.sreekanthp.com
        - name: ingress.tls.enabled
          value: "false"

  destination:
    server: https://kubernetes.default.svc
    namespace: kalemart

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
