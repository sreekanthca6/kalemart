---
# Master playbook — run with:
#   ansible-playbook -i inventory.ini site.yml
#
# Order matters:
#   1. common  — both nodes get baseline OS setup
#   2. server  — control plane installs k3s, exposes the node token
#   3. agent   — worker reads the token from hostvars and joins

- name: Common setup (all nodes)
  hosts: k3s_cluster
  gather_facts: yes
  roles:
    - common

- name: Install k3s server (control plane)
  hosts: k3s_server
  gather_facts: yes
  roles:
    - k3s-server

- name: Install k3s agent (worker)
  hosts: k3s_agent
  gather_facts: yes
  roles:
    - k3s-agent
