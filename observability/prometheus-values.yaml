server:
  persistentVolume:
    enabled: false      # use emptyDir for local dev
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi
  retention: "7d"
  # Enable remote write receiver so OTel Collector can push metrics
  extraFlags:
    - web.enable-remote-write-receiver

  global:
    scrape_interval: 15s
    evaluation_interval: 15s

  # Scrape the OTel Collector's own metrics
  extraScrapeConfigs: |
    - job_name: 'otel-collector'
      static_configs:
        - targets: ['otel-collector-opentelemetry-collector.observability.svc.cluster.local:8888']
    - job_name: 'kalemart-backend'
      static_configs:
        - targets: ['kalemart-backend.kalemart.svc.cluster.local:4000']
    - job_name: 'kalemart-ai-service'
      static_configs:
        - targets: ['kalemart-ai-service.kalemart.svc.cluster.local:5000']

  # Load alert rules from ConfigMap
  alertingRules: {}
  ruleFiles:
    - /etc/config/alerting_rules.yml

alertmanager:
  enabled: true
  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ['alertname', 'severity']
      group_wait: 10s
      group_interval: 30s
      repeat_interval: 1h
      receiver: sre-agent
      routes:
        - match:
            severity: critical
          receiver: sre-agent
          group_wait: 5s          # page faster for critical
        - match:
            severity: warning
          receiver: sre-agent
    receivers:
      - name: sre-agent
        webhook_configs:
          - url: "http://kalemart-sre-agent.kalemart.svc.cluster.local:8080/webhook/alertmanager"
            send_resolved: false

prometheus-pushgateway:
  enabled: false

kube-state-metrics:
  enabled: true

nodeExporter:
  enabled: true
