apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: kalemart-sre-rules
  namespace: observability
  labels:
    app: prometheus
    release: prometheus
spec:
  groups:
    # ── API Latency ────────────────────────────────────────────────────────────
    - name: kalemart.latency
      interval: 30s
      rules:
        - alert: APIHighLatency
          expr: |
            histogram_quantile(0.99,
              sum by (le, route) (
                rate(kalemart_http_request_duration_ms_milliseconds_bucket{job="kalemart-backend"}[5m])
              )
            ) > 2000
          for: 5m
          labels:
            severity: warning
            team: sre
            service: backend
          annotations:
            summary: "High API latency on {{ $labels.route }}"
            description: "p99 latency is {{ $value }}ms on route {{ $labels.route }} (threshold: 2000ms)"
            runbook: "https://github.com/sreekanthca6/kalemart/blob/main/docs/runbooks/api-latency.md"

        - alert: TaxAPIHighLatency
          expr: |
            histogram_quantile(0.99,
              sum by (le) (
                rate(kalemart_http_request_duration_ms_milliseconds_bucket{job="kalemart-backend", route=~"/api/tax.*"}[5m])
              )
            ) > 500
          for: 5m
          labels:
            severity: critical
            team: sre
            service: backend
            subsystem: tax
          annotations:
            summary: "Tax API p99 latency exceeds 500ms"
            description: "Tax endpoint p99 = {{ $value }}ms. Likely a DB query plan issue."
            runbook: "https://github.com/sreekanthca6/kalemart/blob/main/docs/runbooks/tax-latency.md"

    # ── Error Rate ─────────────────────────────────────────────────────────────
    - name: kalemart.errors
      interval: 30s
      rules:
        - alert: HighErrorRate
          expr: |
            sum(rate(kalemart_http_errors_total{job="kalemart-backend"}[5m]))
            /
            clamp_min(sum(rate(kalemart_http_requests_total{job="kalemart-backend"}[5m])), 1) > 0.01
          for: 5m
          labels:
            severity: critical
            team: sre
            service: backend
          annotations:
            summary: "Error rate above 1% on backend"
            description: "{{ $value | humanizePercentage }} of requests are 5xx errors"
            runbook: "https://github.com/sreekanthca6/kalemart/blob/main/docs/runbooks/high-error-rate.md"

        - alert: AIServiceErrors
          expr: |
            sum(rate(kalemart_ai_http_requests_total{job="kalemart-ai-service", status_class="5xx"}[5m])) > 0.1
          for: 3m
          labels:
            severity: warning
            team: sre
            service: ai-service
          annotations:
            summary: "AI service returning errors"
            description: "AI service error rate: {{ $value }} req/s. Check ANTHROPIC_API_KEY."

    # ── Pod Health ─────────────────────────────────────────────────────────────
    - name: kalemart.pods
      interval: 30s
      rules:
        - alert: PodCrashLooping
          expr: |
            increase(kube_pod_container_status_restarts_total{namespace="kalemart"}[15m]) > 3
          for: 0m
          labels:
            severity: critical
            team: sre
          annotations:
            summary: "Pod {{ $labels.pod }} is crash looping"
            description: "{{ $labels.container }} in pod {{ $labels.pod }} has restarted {{ $value }} times in 15m"
            runbook: "https://github.com/sreekanthca6/kalemart/blob/main/docs/runbooks/pod-crashloop.md"

        - alert: PodNotReady
          expr: |
            kube_pod_status_ready{namespace="kalemart", condition="true"} == 0
          for: 5m
          labels:
            severity: warning
            team: sre
          annotations:
            summary: "Pod {{ $labels.pod }} not ready for 5 minutes"
            description: "Pod {{ $labels.pod }} has been unready since {{ $value }}"

    # ── Infrastructure Health ─────────────────────────────────────────────────
    - name: kalemart.infrastructure
      interval: 30s
      rules:
        - alert: NodeNotReady
          expr: |
            kube_node_status_condition{condition="Ready", status="true"} == 0
          for: 5m
          labels:
            severity: critical
            team: sre
            service: kubernetes
          annotations:
            summary: "Kubernetes node {{ $labels.node }} is not ready"
            description: "Node {{ $labels.node }} has been NotReady for more than 5 minutes."
            runbook: "https://github.com/sreekanthca6/kalemart/blob/main/docs/runbooks/node-not-ready.md"

        - alert: DeploymentUnavailable
          expr: |
            kube_deployment_status_replicas_unavailable{namespace=~"kalemart|cloudflared|observability"} > 0
          for: 5m
          labels:
            severity: critical
            team: sre
            service: kubernetes
          annotations:
            summary: "Deployment {{ $labels.namespace }}/{{ $labels.deployment }} has unavailable replicas"
            description: "{{ $labels.deployment }} has {{ $value }} unavailable replica(s). Check rollout, pod events, and recent image changes."
            runbook: "https://github.com/sreekanthca6/kalemart/blob/main/docs/runbooks/deployment-unavailable.md"

        - alert: PodHighCPU
          expr: |
            (
              sum by (namespace, pod) (
                rate(container_cpu_usage_seconds_total{namespace=~"kalemart|cloudflared|observability", container!="", image!=""}[5m])
              )
              /
              sum by (namespace, pod) (
                kube_pod_container_resource_limits{namespace=~"kalemart|cloudflared|observability", resource="cpu"}
              )
            ) > 0.9
          for: 10m
          labels:
            severity: warning
            team: sre
            service: kubernetes
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} CPU above 90% of limit"
            description: "CPU saturation can cause latency and throttling. Check pod CPU, request rate, and HPA status."
            runbook: "https://github.com/sreekanthca6/kalemart/blob/main/docs/runbooks/high-cpu.md"

        - alert: PodHighMemory
          expr: |
            (
              sum by (namespace, pod) (
                container_memory_working_set_bytes{namespace=~"kalemart|cloudflared|observability", container!="", image!=""}
              )
              /
              sum by (namespace, pod) (
                kube_pod_container_resource_limits{namespace=~"kalemart|cloudflared|observability", resource="memory"}
              )
            ) > 0.9
          for: 10m
          labels:
            severity: warning
            team: sre
            service: kubernetes
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} memory above 90% of limit"
            description: "Memory saturation increases OOMKill risk. Check memory trend, logs, and recent deploys."
            runbook: "https://github.com/sreekanthca6/kalemart/blob/main/docs/runbooks/high-memory.md"

        - alert: CloudflaredTunnelDown
          expr: |
            kube_deployment_status_replicas_available{namespace="cloudflared", deployment="cloudflared"} < 1
          for: 2m
          labels:
            severity: critical
            team: sre
            service: cloudflared
          annotations:
            summary: "Cloudflare Tunnel has no available replicas"
            description: "Public traffic may fail because cloudflared has no available pod. Check cloudflared logs, credentials, and ingress connectivity."
            runbook: "https://github.com/sreekanthca6/kalemart/blob/main/docs/runbooks/cloudflared-down.md"

    # ── Database ───────────────────────────────────────────────────────────────
    - name: kalemart.database
      interval: 30s
      rules:
        - alert: PostgresDown
          expr: |
            up{job="kalemart-backend"} == 0
          for: 2m
          labels:
            severity: critical
            team: sre
            service: postgres
          annotations:
            summary: "Backend is unreachable — possible Postgres failure"
            description: "Backend scrape target is down. May indicate DB connection failure."

        - alert: SlowDBQueries
          expr: |
            histogram_quantile(0.95,
              sum by (le) (
                rate(db_query_duration_seconds_bucket{job="kalemart-backend"}[5m])
              )
            ) > 1
          for: 5m
          labels:
            severity: warning
            team: sre
            service: postgres
          annotations:
            summary: "Slow DB queries detected (p95 > 1s)"
            description: "DB query p95 = {{ $value | humanizeDuration }}. Check for missing indexes or lock contention."

    # ── SLO Burn Rate ──────────────────────────────────────────────────────────
    - name: kalemart.slo
      interval: 30s
      rules:
        # Fast burn: consuming monthly error budget 10x in 1h window
        - alert: SLOErrorBudgetFastBurn
          expr: |
            (
              sum(rate(kalemart_http_errors_total{job="kalemart-backend"}[1h]))
              /
              clamp_min(sum(rate(kalemart_http_requests_total{job="kalemart-backend"}[1h])), 1)
            ) > (10 * 0.005)
          for: 5m
          labels:
            severity: critical
            team: sre
            slo: availability
          annotations:
            summary: "SLO fast burn — error budget burning at 10x rate"
            description: "Burning error budget 10x faster than sustainable. Current error rate: {{ $value | humanizePercentage }}"

        # Slow burn: consuming monthly error budget 2x in 6h window
        - alert: SLOErrorBudgetSlowBurn
          expr: |
            (
              sum(rate(kalemart_http_errors_total{job="kalemart-backend"}[6h]))
              /
              clamp_min(sum(rate(kalemart_http_requests_total{job="kalemart-backend"}[6h])), 1)
            ) > (2 * 0.005)
          for: 15m
          labels:
            severity: warning
            team: sre
            slo: availability
          annotations:
            summary: "SLO slow burn — error budget at risk"
            description: "Burning error budget 2x faster than sustainable over 6h. Current error rate: {{ $value | humanizePercentage }}"
