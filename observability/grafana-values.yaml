adminPassword: "kalemart-dev"   # override via secret in prod

ingress:
  enabled: true
  ingressClassName: nginx
  hosts:
    - grafana.kalemart.sreekanthp.com

persistence:
  enabled: false

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Pre-wire all three datasources
datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        url: http://prometheus-server.observability.svc.cluster.local
        access: proxy
        isDefault: true
        jsonData:
          httpMethod: POST

      - name: Tempo
        type: tempo
        uid: tempo
        url: http://tempo.observability.svc.cluster.local:3200
        access: proxy
        jsonData:
          tracesToLogsV2:
            datasourceUid: loki
            filterByTraceID: true
            filterBySpanID: false
          tracesToMetrics:
            datasourceUid: prometheus
          serviceMap:
            datasourceUid: prometheus
          lokiSearch:
            datasourceUid: loki

      - name: Loki
        type: loki
        uid: loki
        url: http://loki.observability.svc.cluster.local:3100
        access: proxy
        jsonData:
          derivedFields:
            - datasourceUid: tempo
              matcherRegex: "trace_id=(\\w+)"
              name: TraceID
              url: "$${__value.raw}"

# Load dashboards from ConfigMaps
dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: kalemart
        orgId: 1
        folder: Kalemart
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/kalemart

dashboardsConfigMaps:
  kalemart: grafana-dashboards

grafana.ini:
  server:
    root_url: "https://grafana.kalemart.sreekanthp.com/"
  analytics:
    reporting_enabled: false
    check_for_updates: false
  auth.anonymous:
    enabled: true
    org_role: Viewer
    hide_version: true
  users:
    viewers_can_edit: false
  unified_alerting:
    enabled: true
