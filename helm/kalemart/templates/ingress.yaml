{{- if .Values.ingress.enabled }}
# Auth ingress — rewrites /api/auth/* → /auth/* because backend mounts auth at /auth, not /api/auth
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kalemart-api-auth
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "kalemart.labels" . | nindent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /auth/$2
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /api/auth(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: kalemart-backend
                port:
                  number: {{ .Values.backend.service.port }}
---
# All other /api/* routes — passed through unchanged (backend mounts them at /api/*)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kalemart-api
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "kalemart.labels" . | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: kalemart-backend
                port:
                  number: {{ .Values.backend.service.port }}
          - path: /sre
            pathType: Prefix
            backend:
              service:
                name: kalemart-sre-agent
                port:
                  number: 8080
---
# Frontend ingress — no rewrite, all other traffic goes to Next.js
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kalemart
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "kalemart.labels" . | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kalemart-frontend
                port:
                  number: {{ .Values.frontend.service.port }}
{{- end }}
