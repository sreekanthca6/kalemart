{{- if .Values.secrets.create }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace "kalemart-secrets" }}
apiVersion: v1
kind: Secret
metadata:
  name: kalemart-secrets
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "kalemart.labels" . | nindent 4 }}
  annotations:
    # Never let Argo CD delete this secret — it is owned by Ansible/Vault, not Helm
    argocd.argoproj.io/sync-options: Prune=false
type: Opaque
data:
  {{- if $existing }}
  {{- /* Secret already exists in the cluster (created by Ansible from Vault).
         Preserve every value as-is — data is already base64 in the K8s API. */}}
  POSTGRES_PASSWORD: {{ index $existing.data "POSTGRES_PASSWORD" | default "" }}
  JWT_SECRET:        {{ index $existing.data "JWT_SECRET"        | default "" }}
  ANTHROPIC_API_KEY: {{ index $existing.data "ANTHROPIC_API_KEY" | default "" }}
  SLACK_WEBHOOK_URL: {{ index $existing.data "SLACK_WEBHOOK_URL" | default "" }}
  DATABASE_URL:      {{ index $existing.data "DATABASE_URL"      | default "" }}
  {{- else }}
  {{- /* First install before Ansible has run — values come from Helm parameters.
         This path should only be hit during local dev (make dev-deploy). */}}
  POSTGRES_PASSWORD: {{ .Values.secrets.postgresPassword | b64enc | quote }}
  JWT_SECRET:        {{ .Values.secrets.jwtSecret        | b64enc | quote }}
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey  | b64enc | quote }}
  SLACK_WEBHOOK_URL: {{ .Values.secrets.slackWebhookUrl  | b64enc | quote }}
  DATABASE_URL:      {{ printf "postgresql://kalemart:%s@kalemart-postgres:5432/kalemart" .Values.secrets.postgresPassword | b64enc | quote }}
  {{- end }}
{{- end }}
