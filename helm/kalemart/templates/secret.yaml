apiVersion: v1
kind: Secret
metadata:
  name: kalemart-secrets
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "kalemart.labels" . | nindent 4 }}
type: Opaque
data:
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | b64enc | quote }}
  POSTGRES_PASSWORD: {{ .Values.secrets.postgresPassword | b64enc | quote }}
  JWT_SECRET: {{ required "secrets.jwtSecret is required" .Values.secrets.jwtSecret | b64enc | quote }}
  SLACK_WEBHOOK_URL: {{ .Values.secrets.slackWebhookUrl | b64enc | quote }}
  DATABASE_URL: {{ printf "postgresql://kalemart:%s@kalemart-postgres:5432/kalemart" .Values.secrets.postgresPassword | b64enc | quote }}
