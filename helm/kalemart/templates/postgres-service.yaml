{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: kalemart-postgres
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "kalemart.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
  selector:
    app.kubernetes.io/name: {{ include "kalemart.name" . }}
    app.kubernetes.io/component: postgres
{{- end }}
