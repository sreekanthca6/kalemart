{{- if .Values.worker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kalemart-worker
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "kalemart.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.worker.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "kalemart.name" . }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "kalemart.name" . }}
        app.kubernetes.io/component: worker
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: worker
          image: {{ include "kalemart.image" (dict "global" .Values.global "image" .Values.worker.image) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          env:
            {{- range $k, $v := .Values.worker.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            {{- include "kalemart.otelEnv" (dict "Values" .Values "component" "worker") | nindent 12 }}
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: kalemart-secrets
                  key: ANTHROPIC_API_KEY
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
{{- end }}
