{{- $ns := .Values.global.namespace }}
{{- $name := include "kalemart.name" . }}
{{- $labels := include "kalemart.labels" . }}

{{- if and .Values.backend.enabled (gt (int .Values.backend.replicaCount) 1) }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: kalemart-backend
  namespace: {{ $ns }}
  labels:
    {{- $labels | nindent 4 }}
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $name }}
      app.kubernetes.io/component: backend
{{- end }}

{{- if and .Values.frontend.enabled (gt (int .Values.frontend.replicaCount) 1) }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: kalemart-frontend
  namespace: {{ $ns }}
  labels:
    {{- $labels | nindent 4 }}
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $name }}
      app.kubernetes.io/component: frontend
{{- end }}

{{- if and .Values.aiService.enabled (gt (int .Values.aiService.replicaCount) 1) }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: kalemart-ai-service
  namespace: {{ $ns }}
  labels:
    {{- $labels | nindent 4 }}
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $name }}
      app.kubernetes.io/component: ai-service
{{- end }}

{{- if and .Values.worker.enabled (gt (int .Values.worker.replicaCount) 1) }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: kalemart-worker
  namespace: {{ $ns }}
  labels:
    {{- $labels | nindent 4 }}
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $name }}
      app.kubernetes.io/component: worker
{{- end }}
