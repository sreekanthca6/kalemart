global:
  # imageRegistry and imagePullPolicy are set by deploy-local.sh at deploy time
  # so they are not hardcoded here
  otelEndpoint: http://otel-collector.observability:4317

frontend:
  replicaCount: 1
  env:
    NEXT_PUBLIC_API_URL: http://localhost:4000
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi

backend:
  replicaCount: 1
  env:
    NODE_ENV: development
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi

worker:
  replicaCount: 1
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi

aiService:
  replicaCount: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

ingress:
  enabled: true
  className: nginx
  host: kalemart.local
  tls:
    enabled: false
