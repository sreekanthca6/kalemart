global:
  namespace: kalemart
  imageRegistry: ""
  imagePullPolicy: IfNotPresent
  otelEndpoint: http://otel-collector-opentelemetry-collector.observability:4317
  imagePullSecrets:
    - name: ghcr-pull-secret
frontend:
  enabled: true
  image:
    repository: kalemart/frontend
    tag: sha-b957c2d
  replicaCount: 1
  service:
    type: ClusterIP
    port: 3000
  env:
    NEXT_PUBLIC_API_URL: http://kalemart-backend:4000
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
backend:
  enabled: true
  image:
    repository: kalemart/backend
    tag: sha-b957c2d
  replicaCount: 1
  service:
    type: ClusterIP
    port: 4000
  env:
    NODE_ENV: production
    PORT: "4000"
    PGHOST: "kalemart-postgres"
    PGPORT: "5432"
    PGDATABASE: "kalemart"
    PGUSER: "kalemart"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
worker:
  enabled: true
  image:
    repository: kalemart/worker
    tag: sha-b957c2d
  replicaCount: 1
  env:
    NODE_ENV: production
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi
aiService:
  enabled: true
  image:
    repository: kalemart/ai-service
    tag: sha-b957c2d
  replicaCount: 1
  service:
    type: ClusterIP
    port: 5000
  env:
    APP_VERSION: "0.0.1"
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 80
ingress:
  enabled: true
  className: nginx
  host: kalemart.local
  tls:
    enabled: false
    secretName: kalemart-tls
postgres:
  enabled: true
  database: kalemart
  user: kalemart
  storage: 5Gi
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
secrets:
  anthropicApiKey: ""
  postgresPassword: ""
  jwtSecret: ""
  slackWebhookUrl: ""
sreAgent:
  enabled: true
  image:
    repository: kalemart/sre-agent
    tag: sha-b957c2d
  externalUrl: "http://kalemart.local/sre"
